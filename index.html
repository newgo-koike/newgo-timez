<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewGo Timez バックナンバー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5efe0;
    --ink: #1a1a1a;
    --ink-sub: #555;
    --ink-mute: #888;
    --line: #c9bfa8;
    --line-strong: #1a1a1a;
    --accent: #8b1a1a;
    --chip: #ebe4d2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    background: #2c2620;
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
  }
  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: #0a0a0a; color: #f0ebdb;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
  }
  .brand { font-family: "Playfair Display", "Noto Serif JP", serif; font-weight: 900; font-size: 18px; letter-spacing: 0.05em; flex-shrink: 0; }
  .brand small { font-size: 10px; font-weight: 400; letter-spacing: 0.2em; opacity: 0.7; margin-left: 6px; vertical-align: middle; }
  .selectors { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
  select {
    background: #f0ebdb; color: #0a0a0a;
    font-family: "Noto Serif JP", serif; font-size: 14px; font-weight: 700;
    padding: 8px 12px; border: none; border-radius: 4px;
    min-width: 0; flex: 1 1 200px; cursor: pointer;
    -webkit-appearance: none; appearance: none;
  }
  .nav-btn {
    background: transparent; color: #f0ebdb; border: 1px solid #666;
    padding: 8px 14px; border-radius: 4px; cursor: pointer;
    font-family: "Noto Serif JP", serif; font-size: 13px;
    min-height: 36px; min-width: 56px;
  }
  .nav-btn:hover { background: #333; }
  .nav-btn:active { background: #555; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .count { font-size: 12px; color: #aaa; flex-basis: 100%; text-align: right; }

  @media (max-width: 600px) {
    .top-bar { padding: 10px 12px; gap: 8px; }
    .brand { font-size: 16px; flex-basis: 100%; }
    .brand small { display: none; }
    select { flex: 1 1 auto; min-width: 0; font-size: 13px; }
    .nav-btn { font-size: 12px; padding: 8px 10px; min-width: 48px; }
    .count { font-size: 11px; }
  }

  .stage {
    max-width: 800px; margin: 0 auto; padding: 16px 12px 80px;
  }
  .edition-card {
    background: var(--paper); border: 1px solid var(--line-strong);
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    overflow: hidden;
  }
  @media (max-width: 600px) {
    .stage { padding: 12px 8px 60px; }
  }

  .edition-image {
    display: block; width: 100%; height: auto;
    background: #fff;
  }
  .empty {
    color: #f5efe0; text-align: center; padding: 80px 20px;
    font-size: 16px; opacity: 0.6;
  }
  .footer {
    text-align: center; color: #888; font-size: 12px; margin-top: 24px;
    padding: 16px;
  }
  .footer a { color: #c9bfa8; text-decoration: none; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">NewGo Timez<small>バックナンバー</small></div>
  <div class="selectors">
    <button class="nav-btn" id="prevBtn">◀ 前日</button>
    <select id="dateSelect"></select>
    <button class="nav-btn" id="nextBtn">翌日 ▶</button>
    <span class="count" id="countLabel"></span>
  </div>
</div>

<main class="stage">
  <div id="editionContainer"></div>
  <div class="footer">NewGo Timez ― 編集発行 NewGo Editorial / お届け 小池の秘書 / <a href="https://github.com/newgo-koike/newgo-timez">archive on GitHub</a></div>
</main>

<script>
// ─────────────────────────────────────────────
// EDITIONS array. New entries inserted at the top by the skill.
// 各オブジェクト: { date, headline, topics }
// 対応PNG: pngs/${date}.png  / 対応HTML: editions/${date}.html
// ─────────────────────────────────────────────
const EDITIONS = [
  /* __INSERT_NEW_EDITION_HERE__ */
  { date: "2026-05-06", headline: "日豪首脳、経済安保で共同宣言 ― 中国念頭に輸出規制・資源協調へ", topics: ["政治・経済", "世界の動き", "障がい福祉", "薬剤師", "エンタメ", "長野"] },
  { date: "2026-05-05", headline: "米中首脳会談、5月中旬実施へ ― トランプ訪中、関税合意を再点検", topics: ["国際", "政治・経済", "AI・テック", "スタートアップ", "薬剤師", "障がい福祉", "長野"] },
  { date: "2026-05-04", headline: "障害福祉報酬、6月期中改定へ ― 新規事業所に減額の波紋", topics: ["障がい福祉", "政治・経済", "AI・テック", "薬剤師", "スタートアップ", "長野"] },
];

const sel = document.getElementById('dateSelect');
const container = document.getElementById('editionContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const countLabel = document.getElementById('countLabel');

function fmtDate(iso) {
  const d = new Date(iso);
  const wk = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wk}）`;
}

function render(idx) {
  if (EDITIONS.length === 0) {
    container.innerHTML = '<div class="empty">まだ発行された号はありません。<br>毎朝6時に最新号が届きます。</div>';
    countLabel.textContent = '';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }
  const e = EDITIONS[idx];
  container.innerHTML = `
    <div class="edition-card">
      <img class="edition-image" src="pngs/${e.date}.png" alt="${e.date} NewGo Timez" loading="lazy">
    </div>
  `;
  countLabel.textContent = `${idx+1} / ${EDITIONS.length} 号`;
  prevBtn.disabled = idx >= EDITIONS.length - 1;  // 古い側
  nextBtn.disabled = idx <= 0;                    // 新しい側
}

EDITIONS.forEach((e, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = fmtDate(e.date) + (i === 0 ? ' ― 最新号' : '');
  sel.appendChild(opt);
});

sel.addEventListener('change', e => render(parseInt(e.target.value, 10)));
prevBtn.addEventListener('click', () => {
  const i = parseInt(sel.value, 10) + 1;
  if (i < EDITIONS.length) { sel.value = i; render(i); }
});
nextBtn.addEventListener('click', () => {
  const i = parseInt(sel.value, 10) - 1;
  if (i >= 0) { sel.value = i; render(i); }
});

render(0);
</script>
</body>
</html>
