    font-family: "Noto Serif JP", serif; font-size: 13px;

  .nav-btn:active { background: #555; }

  .count { font-size: 12px; color: #aaa; flex-basis: 100%; text-align: right; }

    .top-bar { padding: 10px 12px; gap: 8px; }
    .brand { font-size: 16px; flex-basis: 100%; }
    .brand small { display: none; }

    .nav-btn { font-size: 12px; padding: 8px 10px; min-width: 48px; }
    .count { font-size: 11px; }
  }

    max-width: 1200px; margin: 0 auto; padding: 16px 12px 80px;
  }
  .edition-card {
    background: var(--paper); border: 1px solid var(--line-strong);

    overflow: hidden;
  }
  @media (max-width: 600px) {
    .stage { padding: 12px 8px 60px; }
  }

    display: block; width: 100%; height: 4000px;
    border: none; background: #f0ebdb;
  }
  .empty {
    color: #f5efe0; text-align: center; padding: 80px 20px;

  }
  .footer {

const sel = document.getElementById('dateSelect');
const container = document.getElementById('editionContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const countLabel = document.getElementById('countLabel');

function fmtDate(iso) {
  const d = new Date(iso);
  const wk = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wk}）`;
}

function render(idx) {
  if (EDITIONS.length === 0) {
    container.innerHTML = '<div class="empty">まだ発行された号はありません。<br>毎朝6時に最新号が届きます。</div>';
    countLabel.textContent = '';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }
  const e = EDITIONS[idx];
  const card = document.createElement('div');
  card.className = 'edition-card';
  const iframe = document.createElement('iframe');
  iframe.className = 'edition-iframe';
  iframe.src = `editions/${e.date}.html`;
  iframe.title = `${e.date} NewGo Timez`;
  iframe.onload = function() {
    try {
      const h = iframe.contentDocument.documentElement.scrollHeight;
      if (h > 200) iframe.style.height = h + 'px';
    } catch(err) {}
  };
  card.appendChild(iframe);
  container.innerHTML = '';
  container.appendChild(card);
  countLabel.textContent = `${idx+1} / ${EDITIONS.length} 号`;
  prevBtn.disabled = idx >= EDITIONS.length - 1;
  nextBtn.disabled = idx <= 0;
}

EDITIONS.forEach((e, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = fmtDate(e.date) + (i === 0 ? ' ― 最新号' : '');
  sel.appendChild(opt);
});

sel.addEventListener('change', e => render(parseInt(e.target.value, 10)));
prevBtn.addEventListener('click', () => {
  const i = parseInt(sel.value, 10) + 1;
  if (i < EDITIONS.length) { sel.value = i; render(i); }
});
nextBtn.addEventListener('click', () => {
  const i = parseInt(sel.value, 10) - 1;
  if (i >= 0) { sel.value = i; render(i); }
});

render(0);
</script>
